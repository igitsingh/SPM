version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: spm_postgres_new
    restart: always
    environment:
      POSTGRES_USER: spm_user
      POSTGRES_PASSWORD: spm_password
      POSTGRES_DB: spm_db
    ports:
      - "5434:5432"
    volumes:
      - ./pg_data_new:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: spm_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
