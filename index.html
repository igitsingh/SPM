<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Books Publisher India | NEP Based Books | Suman Prakashan Mandir</title>
    <meta name="description"
        content="Suman Prakashan Mandir: Best NEP-based school books. Hindi, English, Math, EVS. A legacy publishing house serving education since generations.">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css?v=7">
    <link rel="stylesheet" href="css/global.css?v=7">
    <link rel="stylesheet" href="css/portal.css?v=7"> <!-- ADDED: Portal Design System -->
    <link rel="stylesheet" href="css/components.css?v=8">
    <link rel="stylesheet" href="css/layout.css?v=7">
    <link rel="icon" type="image/svg+xml"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
</head>

<body>
    <div id="app">
        <!-- Header will be injected here -->
        <header id="header"></header>

        <!-- Main Content -->
        <main id="main-content">
            <!-- Views will be injected here -->
        </main>

        <!-- Footer will be injected here -->
        <footer id="footer"></footer>

        <!-- Global Components -->
        <div id="book-detail-flyout" class="flyout"></div>
        <div id="overlay" class="modal-overlay"></div>

        <!-- Order Type Selection Modal -->
        <div id="order-type-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Start Order</h3>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <p>Please select the type of order you wish to place:</p>
                    <div class="order-options">
                        <button class="btn btn-outline order-option" data-type="school">
                            <span class="icon">🏫</span>
                            <span class="text">School Order</span>
                        </button>
                        <button class="btn btn-outline order-option" data-type="distributor">
                            <span class="icon">🚚</span>
                            <span class="text">Distributor Order</span>
                        </button>
                        <button class="btn btn-outline order-option" data-type="retailer">
                            <span class="icon">🏪</span>
                            <span class="text">Retailer Order</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="js/main.js?v=11"></script>
</body>

</html>
